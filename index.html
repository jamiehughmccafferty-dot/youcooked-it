    var IMAGED={"roast-chicken":1,"marry-me-chicken":1,"chicken-parmesan":1,"honey-garlic-chicken":1,"chicken-fajitas":1,"fried-chicken":1,"chicken-stir-fry":1,"chicken-pot-pie":1,"lemon-chicken":1,"chicken-shawarma":1,"bbq-chicken":1,"buffalo-wings":1,"chicken-enchiladas":1,"teriyaki-chicken":1,"coronation-chicken":1,"chicken-kiev":1,"jerk-chicken":1,"chicken-quesadilla":1,"chicken-satay":1,"nashville-hot-chicken":1,"chicken-schnitzel":1,"chicken-gyros":1,"butter-chicken":1,"chicken-tikka-masala":1,"chicken-curry":1,"chicken-katsu-curry":1,"thai-green-curry":1,"thai-red-curry":1,"beef-rendang":1,"lamb-rogan-josh":1,"chana-masala":1,"saag-paneer":1,"massaman-curry":1,"dal-tadka":1,"prawn-curry":1,"vegetable-korma":1,"spaghetti-bolognese":1,"spaghetti-carbonara":1,"chicken-alfredo":1,"lasagna":1,"mac-and-cheese":1,"pesto-pasta":1,"penne-arrabbiata":1,"cacio-e-pepe":1,"creamy-tuscan-pasta":1,"baked-ziti":1,"pasta-puttanesca":1,"gnocchi-pomodoro":1,"ravioli-sage-butter":1,"spaghetti-aglio-e-olio":1,"creamy-mushroom-pasta":1,"sausage-rigatoni":1,"chocolate-chip-cookies":1,"fudgy-brownies":1,"new-york-cheesecake":1,"tiramisu":1,"creme-brulee":1,"apple-pie":1,"chocolate-mousse":1,"panna-cotta":1,"bread-pudding":1,"sticky-toffee-pudding":1,"lemon-bars":1,"key-lime-pie":1,"pecan-pie":1,"churros":1,"banoffee-pie":1,"dubai-chocolate-bar":1,"victoria-sponge":1,"chocolate-cake":1,"carrot-cake":1,"red-velvet-cake":1,"lemon-drizzle-cake":1,"vanilla-cupcakes":1,"coffee-cake":1,"pound-cake":1,"funfetti-cake":1,"black-forest-cake":1,"angel-food-cake":1,"molten-lava-cake":1,"banana-bread":1,"scones":1,"blueberry-muffins":1,"cinnamon-rolls":1,"shortbread":1,"flapjacks":1,"croissants":1,"chocolate-chip-muffins":1,"gingerbread":1,"oatmeal-raisin-cookies":1,"snickerdoodles":1,"peanut-butter-cookies":1,"sourdough-bread":1,"focaccia":1,"naan":1,"garlic-bread":1,"dinner-rolls":1,"soda-bread":1,"ciabatta":1,"brioche":1,"chicken-noodle-soup":1,"tomato-soup":1};
    var grid=document.getElementById('grid'),count=document.getElementById('count'),filters=document.getElementById('filters');
    var active='all';
    function chip(label,val){var b=document.createElement('button');b.className='fchip'+(val===active?' on':'');b.textContent=label;b.onclick=function(){active=val;draw();};return b;}
    function drawFilters(){filters.innerHTML='';filters.appendChild(chip('all','all'));CATS.forEach(function(c){filters.appendChild(chip(c,c));});}
    function draw(){
      drawFilters();grid.innerHTML='';
      var list=CARDS.filter(function(c){return active==='all'||c.category===active;});
      // on the unfiltered view, pin the trending recipes to the front (stable order otherwise)
      if(active==='all')list=list.slice().sort(function(a,b){return (b.tag==='trender')-(a.tag==='trender');});
      list.forEach(function(c){
        var col=CAT[c.category]||'#e2561f';
        var hasImg=!!IMAGED[c.slug];
        var a=document.createElement('a');a.className='card'+(hasImg?' has-img':'');a.href=LINK+c.slug+'.html';a.style.setProperty('--c',col);
        var art=hasImg?'<div class="cglow"></div><img class="cimg" alt="" onerror="this.previousSibling.style.display=\'none\';this.style.display=\'none\'" src="'+ASSET+'images/'+c.slug+'.png">':'<div class="cblob"></div>';
        a.innerHTML=art+(c.tag==='trender'?'<div class="tag">trending</div>':'')+
          '<div class="inner"><div class="ccat">'+c.category+'</div><div class="ctitle">'+c.title.toLowerCase()+'</div></div>';
        grid.appendChild(a);
      });
      count.textContent=list.length+' of '+CARDS.length+' recipes';
    }
    draw();
  </script>
</body>
</html>
